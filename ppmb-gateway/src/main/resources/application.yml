server:
  port: 9333

spring:
  profiles:
    active: dev # 默认激活开发环境
  application:
    name: ppmb-gateway
  config:
    import: "optional:consul:"
  cloud:
    consul:
      discovery:
        service-name: ${spring.application.name}
        instance-id: ${spring.application.name}:${server.port}
        prefer-ip-address: true
    gateway:
      server:
        webmvc:
          routes:
            - id: system-service-route
              uri: lb://ppmb-system
              predicates:
                - Path=/api/system/**
              filters:
                - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
