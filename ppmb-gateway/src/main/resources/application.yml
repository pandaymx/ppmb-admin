server:
  port: 9333

spring:
  profiles:
    active: dev # 默认激活开发环境
  threads:
    virtual:
      enabled: true
  application:
    name: ppmb-gateway
  config:
    import: "optional:consul:"
  cloud:
    consul:
      discovery:
        service-name: ${spring.application.name}
        instance-id: ${spring.application.name}:${server.port}
        prefer-ip-address: true
    gateway:
      server:
        webmvc:
          routes:
            - id: system-service-route
              uri: lb://ppmb-system
              predicates:
                - Path=/api/system/**
              filters:
                - StripPrefix=2
            - id: auth-service-route
              uri: lb://ppmb-auth
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: user-service-route
              uri: lb://ppmb-system
              predicates:
                - Path=/api/user/**
              filters:
                - StripPrefix=2
          cors:
            configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:3001"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
 
ppmb:
  security:
    gateway-mode: true
    jwt:
      secret: "dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtcHVycG9zZXM=" # 32 bytes Base64

management:
  endpoints:
    web:
      exposure:
        include: 'health,info,prometheus'
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    urls:
      - name: ppmb-system
        url: /api/system/v3/api-docs
