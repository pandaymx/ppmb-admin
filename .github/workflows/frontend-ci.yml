name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ppmb-admin-ui/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ppmb-admin-ui/**'

jobs:
  build-and-lint:
    name: Lint, Type Check and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ppmb-admin-ui

    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@986537148301e4001c601449079626359556391d # v1.2.1
        with:
          bun-version: 1.1.7

      - name: Install Dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Linting
        run: bun run lint

      - name: Type Checking
        run: bun x tsc --noEmit

      - name: Production Build
        run: bun run build

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ppmb-admin-ui
