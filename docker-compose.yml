services:
  consul-server:
    image: consul:1.15.4 # 建议锁定版本号
    container_name: consul-server
    restart: always
    volumes:
      - ../ppmb-admin-docker-data/consul/data:/consul/data
      - ../ppmb-admin-docker-data/consul/config:/consul/config
    ports:
      - "8500:8500" # UI 界面和 HTTP API
      - "8600:8600/udp" # DNS 服务
    command: "agent -server -bootstrap-expect=1 -ui -client=0.0.0.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ppmb-admin

  sonar-db:
    image: postgres:17-alpine
    container_name: sonar-db
    networks:
      - ppmb-admin
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - ../ppmb-admin-docker-data/sonar-db/data:/var/lib/postgresql/data

  ppmb-db:
    image: postgres:18
    container_name: ppmb-db
    networks:
      - ppmb-admin
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ppmb
    ports:
      - "5432:5432"
    volumes:
      - ../ppmb-admin-docker-data/ppmb-db/data:/var/lib/postgresql

  sonarqube:
    image: sonarqube:latest
    container_name: sonarqube
    ports:
      - "9000:9000"
    networks:
      - ppmb-admin
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    depends_on:
      - sonar-db

  redis:
    image: redis:7-alpine
    container_name: ppmb-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ../ppmb-admin-docker-data/redis/data:/data
    networks:
      - ppmb-admin

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ppmb-mq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ../ppmb-admin-docker-data/rabbitmq/data:/var/lib/rabbitmq
      - ../ppmb-admin-docker-data/rabbitmq/log:/var/log/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - ppmb-admin

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../ppmb-admin-docker-data/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../ppmb-admin-docker-data/prometheus/config/sonarqube_token:/etc/prometheus/sonarqube_token
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ppmb-admin

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../ppmb-admin-docker-data/grafana/config/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ppmb-admin

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ppmb-admin

networks:
  ppmb-admin:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
