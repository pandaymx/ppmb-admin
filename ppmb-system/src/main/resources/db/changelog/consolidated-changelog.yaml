databaseChangeLog:
  # ===== TABLE: sys_user =====
  - changeSet:
      id: "consolidated-001-sys-user"
      author: consolidated
      changes:
        - createTable:
            tableName: sys_user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: create_by_dept
                  type: BIGINT
              - column:
                  name: update_by
                  type: BIGINT
              - column:
                  name: update_time
                  type: TIMESTAMP
              - column:
                  name: del_flag
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: nickname
                  type: VARCHAR(50)
              - column:
                  name: email
                  type: VARCHAR(100)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: status
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: dept_id
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: role_id
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: data_scope
                  type: INT
                  defaultValueNumeric: 0
        - createIndex:
            tableName: sys_user
            indexName: idx_sys_user_username
            columns:
              - column:
                  name: username

