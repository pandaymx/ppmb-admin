  # ===== TABLE: sys_dict_data =====
  - changeSet:
      id: "consolidated-009-sys-dict-data"
      author: consolidated
      changes:
        - createTable:
            tableName: sys_dict_data
            remarks: "字典数据表"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  remarks: "主键"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  remarks: "租户ID"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: TIMESTAMP
                  remarks: "创建时间"
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: BIGINT
                  remarks: "创建人"
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: BIGINT
                  remarks: "父主键ID(字典类型ID)"
                  constraints:
                    nullable: false
              - column:
                  name: dict_sort
                  type: INT
                  remarks: "字典排序"
                  constraints:
                    nullable: false
              - column:
                  name: dict_label
                  type: VARCHAR(100)
                  remarks: "字典标签"
                  constraints:
                    nullable: false
              - column:
                  name: dict_value
                  type: VARCHAR(100)
                  remarks: "字典键值"
                  constraints:
                    nullable: false
              - column:
                  name: dict_type
                  type: VARCHAR(100)
                  remarks: "字典类型"
                  constraints:
                    nullable: false
              - column:
                  name: is_default
                  type: VARCHAR(1)
                  remarks: "是否默认（Y是 N否）"
                  defaultValue: "N"
                  constraints:
                    nullable: false
              - column:
                  name: list_class
                  type: VARCHAR(100)
                  remarks: "表格字典样式"
              - column:
                  name: status
                  type: INT
                  remarks: "状态（0正常 1停用）"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: remark
                  type: VARCHAR(500)
                  remarks: "备注"
              - column:
                  name: del_flag
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: dept_id
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: role_id
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: data_scope
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: update_by
                  type: BIGINT
              - column:
                  name: update_time
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: sys_dict_data
            columnNames: dict_type, dict_value
            constraintName: uk_sys_dict_data_type_value
        - createIndex:
            tableName: sys_dict_data
            indexName: idx_sys_dict_data_type
            columns:
              - column:
                  name: dict_type

  # ===== TABLE: sys_audit_log =====
  - changeSet:
      id: "consolidated-010-sys-audit-log"
      author: consolidated
      changes:
        - createTable:
            tableName: sys_audit_log
            remarks: "审计日志表"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  remarks: "主键 ID"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trace_id
                  type: VARCHAR(64)
                  remarks: "幂等性追踪 ID"
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: operation_name
                  type: VARCHAR(255)
                  remarks: "操作名称"
              - column:
                  name: entity_name
                  type: VARCHAR(255)
                  remarks: "受影响的实体名称"
              - column:
                  name: entity_id
                  type: VARCHAR(64)
                  remarks: "受影响的实体ID"
              - column:
                  name: old_value
                  type: jsonb
                  remarks: "变更前数据"
              - column:
                  name: new_value
                  type: jsonb
                  remarks: "变更后数据"
              - column:
                  name: request_uri
                  type: VARCHAR(255)
                  remarks: "请求 URI"
              - column:
                  name: request_method
                  type: VARCHAR(20)
                  remarks: "请求方法"
              - column:
                  name: request_params
                  type: TEXT
                  remarks: "请求参数"
              - column:
                  name: ip
                  type: VARCHAR(64)
                  remarks: "操作 IP"
              - column:
                  name: user_id
                  type: BIGINT
                  remarks: "操作人 ID"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  remarks: "创建时间"
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  remarks: "租户 ID"
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: BIGINT
                  defaultValueNumeric: 0
                  remarks: "创建者 ID"
                  constraints:
                    nullable: false
              - column:
                  name: dept_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  remarks: "部门 ID"
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  remarks: "角色 ID"
                  constraints:
                    nullable: false
              - column:
                  name: data_scope
                  type: INT
                  defaultValueNumeric: 0
                  remarks: "数据范围"
                  constraints:
                    nullable: false
        - createIndex:
            tableName: sys_audit_log
            indexName: idx_sys_audit_log_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: sys_audit_log
            indexName: idx_sys_audit_log_entity
            columns:
              - column:
                  name: entity_name
              - column:
                  name: entity_id
        - createIndex:
            tableName: sys_audit_log
            indexName: idx_sys_audit_log_tenant_id
            columns:
              - column:
                  name: tenant_id

  # ===== TABLE: sys_exception_log =====
