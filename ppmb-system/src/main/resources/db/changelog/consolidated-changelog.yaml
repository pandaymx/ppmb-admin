  # ===== TABLE: sys_dict_type =====
  - changeSet:
      id: "consolidated-008-sys-dict-type"
      author: consolidated
      changes:
        - createTable:
            tableName: sys_dict_type
            remarks: "字典类型表"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  remarks: "主键"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  remarks: "租户ID"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: TIMESTAMP
                  remarks: "创建时间"
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: BIGINT
                  remarks: "创建人"
                  constraints:
                    nullable: false
              - column:
                  name: create_by_dept
                  type: BIGINT
                  remarks: "创建人部门"
              - column:
                  name: update_by
                  type: BIGINT
                  remarks: "更新人"
              - column:
                  name: update_time
                  type: TIMESTAMP
                  remarks: "更新时间"
              - column:
                  name: del_flag
                  type: INT
                  remarks: "删除标志（0代表存在 1代表删除）"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INT
                  remarks: "版本号"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: dict_name
                  type: VARCHAR(100)
                  remarks: "字典名称"
                  constraints:
                    nullable: false
              - column:
                  name: dict_type
                  type: VARCHAR(100)
                  remarks: "字典类型"
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: "uk_sys_dict_type"
              - column:
                  name: system_flag
                  type: VARCHAR(1)
                  remarks: "系统内置标志（Y是 N否）"
                  defaultValue: "N"
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: INT
                  remarks: "状态（0正常 1停用）"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: remark
                  type: VARCHAR(500)
                  remarks: "备注"
              - column:
                  name: dept_id
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: role_id
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: data_scope
