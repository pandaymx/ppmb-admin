databaseChangeLog:
  - changeSet:
      id: "20260503-001"
      author: jules
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: sys_menu
      changes:
        - createTable:
            tableName: sys_menu
            remarks: "System Menu Table"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  remarks: "Primary Key"
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_sys_menu
              - column:
                  name: menu_name
                  type: VARCHAR(50)
                  remarks: "Menu Name"
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  remarks: "Parent Menu ID"
              - column:
                  name: menu_type
                  type: CHAR(1)
                  remarks: "Menu Type (M: Directory, C: Menu, F: Button)"
                  constraints:
                    nullable: false
              - column:
                  name: path
                  type: VARCHAR(200)
                  remarks: "Routing Path"
              - column:
                  name: component
                  type: VARCHAR(255)
                  remarks: "Component Path"
              - column:
                  name: perms
                  type: VARCHAR(100)
                  remarks: "Permission String"
              - column:
                  name: icon
                  type: VARCHAR(100)
                  remarks: "Menu Icon"
              - column:
                  name: order_num
                  type: INT
                  defaultValueNumeric: 0
                  remarks: "Display Order"
              - column:
                  name: visible
                  type: BOOLEAN
                  defaultValueBoolean: true
                  remarks: "Is Visible"
              - column:
                  name: create_by
                  type: BIGINT
                  remarks: "Creator ID"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  remarks: "Creation Time"
              - column:
                  name: update_by
                  type: BIGINT
                  remarks: "Updater ID"
              - column:
                  name: update_time
                  type: TIMESTAMP
                  remarks: "Update Time"
              - column:
                  name: del_flag
                  type: SMALLINT
                  defaultValueNumeric: 0
                  remarks: "Deletion Flag (0: Normal, 1: Deleted)"
        - createIndex:
            tableName: sys_menu
            indexName: idx_sys_menu_parent_id
            columns:
              - column:
                  name: parent_id
