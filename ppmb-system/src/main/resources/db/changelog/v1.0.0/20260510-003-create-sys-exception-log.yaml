databaseChangeLog:
  - changeSet:
      id: "20260510-003-create-sys-exception-log"
      author: antigravity
      comment: "创建异常日志表 sys_exception_log"
      changes:
        - createTable:
            tableName: sys_exception_log
            remarks: "异常日志表"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  remarks: "主键"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: service_name
                  type: VARCHAR(100)
                  remarks: "服务名称"
              - column:
                  name: exception_name
                  type: VARCHAR(255)
                  remarks: "异常类名"
              - column:
                  name: message
                  type: TEXT
                  remarks: "异常信息"
              - column:
                  name: stack_trace
                  type: TEXT
                  remarks: "堆栈跟踪"
              - column:
                  name: request_uri
                  type: VARCHAR(255)
                  remarks: "请求 URI"
              - column:
                  name: request_method
                  type: VARCHAR(10)
                  remarks: "请求方法"
              - column:
                  name: request_params
                  type: TEXT
                  remarks: "请求参数"
              - column:
                  name: ip
                  type: VARCHAR(50)
                  remarks: "IP 地址"
              - column:
                  name: user_id
                  type: BIGINT
                  remarks: "用户 ID"
              - column:
                  name: create_time
                  type: TIMESTAMP
                  remarks: "创建时间"
