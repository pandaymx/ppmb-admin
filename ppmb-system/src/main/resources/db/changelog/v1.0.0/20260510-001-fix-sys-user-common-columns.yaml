databaseChangeLog:
  - changeSet:
      id: "20260510-001-dept-id"
      author: jules
      comment: "补齐 sys_user 通用字段 dept_id, role_id, data_scope"
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: sys_user
        - not:
            - columnExists:
                tableName: sys_user
                columnName: dept_id
      changes:
        - addColumn:
            tableName: sys_user
            columns:
              - column:
                  name: dept_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: data_scope
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
