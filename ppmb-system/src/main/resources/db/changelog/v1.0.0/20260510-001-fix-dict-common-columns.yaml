databaseChangeLog:
  - changeSet:
      id: "20260510-001-fix-dict-common-columns"
      author: antigravity
      validCheckSum: ANY
      comment: "补齐 sys_dict_type 和 sys_dict_data 缺失的通用字段 (dept_id, role_id, data_scope)"
      changes:
        - sql:
            dbms: postgresql
            sql: |
              -- sys_dict_type
              ALTER TABLE sys_dict_type ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_dict_type ADD COLUMN IF NOT EXISTS role_id BIGINT DEFAULT 0;
              ALTER TABLE sys_dict_type ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;
              
              -- sys_dict_data
              ALTER TABLE sys_dict_data ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_dict_data ADD COLUMN IF NOT EXISTS role_id BIGINT DEFAULT 0;
              ALTER TABLE sys_dict_data ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;
              ALTER TABLE sys_dict_data ADD COLUMN IF NOT EXISTS update_by BIGINT;
              ALTER TABLE sys_dict_data ADD COLUMN IF NOT EXISTS update_time TIMESTAMP;

  - changeSet:
      id: "20260510-002-fix-dict-column-types"
      author: antigravity
      comment: "修正字典表字段类型不匹配 (char(1) -> varchar(1))"
      changes:
        - sql:
            dbms: postgresql
            sql: |
              -- 修正类型不匹配 (char(1) -> varchar(1))
              ALTER TABLE sys_dict_type ALTER COLUMN system_flag TYPE VARCHAR(1);
              ALTER TABLE sys_dict_data ALTER COLUMN is_default TYPE VARCHAR(1);

  - changeSet:
      id: "20260510-004-fix-menu-post-column-types"
      author: antigravity
      comment: "修正 sys_menu 和 sys_post 字段类型不匹配 (smallint -> integer, char -> varchar)"
      changes:
        - sql:
            dbms: postgresql
            sql: |
              -- sys_menu del_flag (smallint -> integer)
              ALTER TABLE sys_menu ALTER COLUMN del_flag TYPE INTEGER;
              
              -- sys_menu menu_type (char(1) -> varchar(1))
              ALTER TABLE sys_menu ALTER COLUMN menu_type TYPE VARCHAR(1);
              
              -- sys_post status (tinyint/smallint -> integer)
              ALTER TABLE sys_post ALTER COLUMN status TYPE INTEGER;
