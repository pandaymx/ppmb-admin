databaseChangeLog:
  - changeSet:
      id: "20260505-001-tenant-id"
      author: antigravity
      comment: "补齐 sys_menu 通用字段 tenant_id（旧表结构缺失会导致后续默认值变更失败）"
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: sys_menu
        - not:
            - columnExists:
                tableName: sys_menu
                columnName: tenant_id
      changes:
        - addColumn:
            tableName: sys_menu
            columns:
              - column:
                  name: tenant_id
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

  - changeSet:
      id: "20260505-001-version"
      author: antigravity
      comment: "补齐 sys_menu 通用字段 version（旧表结构缺失会导致后续默认值变更失败）"
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: sys_menu
        - not:
            - columnExists:
                tableName: sys_menu
                columnName: version
      changes:
        - addColumn:
            tableName: sys_menu
            columns:
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

  - changeSet:
      id: "20260505-001-status"
      author: antigravity
      comment: "补齐 sys_menu 通用字段 status（旧表结构缺失会导致后续默认值变更失败）"
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: sys_menu
        - not:
            - columnExists:
                tableName: sys_menu
                columnName: status
      changes:
        - addColumn:
            tableName: sys_menu
            columns:
              - column:
                  name: status
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

