databaseChangeLog:
  # 1. 结构变更 (DDL) - 使用 SQL 确保幂等性
  - changeSet:
      id: "20260503-003-ddl-refined"
      author: jules
      validCheckSum:
        - ANY
      changes:
        - sql:
            dbms: postgresql
            sql: |
              -- sys_department
              CREATE TABLE IF NOT EXISTS sys_department (
                id BIGINT PRIMARY KEY,
                tenant_id BIGINT NOT NULL,
                create_time TIMESTAMP NOT NULL,
                create_by BIGINT NOT NULL,
                dept_id BIGINT DEFAULT 0 NOT NULL,
                role_id BIGINT DEFAULT 0 NOT NULL,
                data_scope INT DEFAULT 0 NOT NULL,
                update_by BIGINT,
                update_time TIMESTAMP,
                del_flag INT DEFAULT 0 NOT NULL,
                version INT DEFAULT 0 NOT NULL,
                parent_id BIGINT,
                dept_name VARCHAR(100) NOT NULL,
                dept_code VARCHAR(50),
                abbreviation VARCHAR(50),
                email VARCHAR(100),
                phone VARCHAR(20),
                leader_id BIGINT,
                sort_num INT,
                status INT NOT NULL
              );

              -- sys_user
              ALTER TABLE sys_user ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_user ADD COLUMN IF NOT EXISTS role_id BIGINT DEFAULT 0;
              ALTER TABLE sys_user ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;

              -- sys_role
              ALTER TABLE sys_role ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_role ADD COLUMN IF NOT EXISTS role_id BIGINT DEFAULT 0;
              ALTER TABLE sys_role ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;

              -- sys_user_role
              ALTER TABLE sys_user_role ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_user_role ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;
              ALTER TABLE sys_user_role ADD COLUMN IF NOT EXISTS update_by BIGINT;
              ALTER TABLE sys_user_role ADD COLUMN IF NOT EXISTS update_time TIMESTAMP;
              ALTER TABLE sys_user_role ADD COLUMN IF NOT EXISTS del_flag INT DEFAULT 0;
              ALTER TABLE sys_user_role ADD COLUMN IF NOT EXISTS version INT DEFAULT 0;

              -- sys_post
              ALTER TABLE sys_post ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_post ADD COLUMN IF NOT EXISTS role_id BIGINT DEFAULT 0;
              ALTER TABLE sys_post ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;

              -- sys_menu
              ALTER TABLE sys_menu ADD COLUMN IF NOT EXISTS tenant_id BIGINT DEFAULT 0;
              ALTER TABLE sys_menu ADD COLUMN IF NOT EXISTS dept_id BIGINT DEFAULT 0;
              ALTER TABLE sys_menu ADD COLUMN IF NOT EXISTS role_id BIGINT DEFAULT 0;
              ALTER TABLE sys_menu ADD COLUMN IF NOT EXISTS data_scope INT DEFAULT 0;
              ALTER TABLE sys_menu ADD COLUMN IF NOT EXISTS version INT DEFAULT 0;

  # 2. 数据初始化 (DML)
  - changeSet:
      id: "20260503-003-data-refined"
      author: jules
      validCheckSum:
        - ANY
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(1) FROM sys_user WHERE username = 'admin'"
      changes:
        - insert:
            tableName: sys_department
            columns:
              - column: {name: id, valueNumeric: 0}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: dept_name, value: "虚拟部门"}
              - column: {name: dept_code, value: "virtual"}
              - column: {name: status, valueNumeric: 0}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}
        - insert:
            tableName: sys_role
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: role_name, value: "超级管理员"}
              - column: {name: role_code, value: "admin"}
              - column: {name: status, valueNumeric: 1}
              - column: {name: is_readonly, valueBoolean: true}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}
        - insert:
            tableName: sys_user
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 1}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: username, value: "admin"}
              - column: {name: password, value: "$2a$10$7JB720yubVSZvUI0rEqK/.VqGOZTH.ulu33dMnvzhkByS9nUu9Z.G"}
              - column: {name: nickname, value: "管理员"}
              - column: {name: status, valueNumeric: 0}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}
        - insert:
            tableName: sys_user_role
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: role_id, valueNumeric: 1}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}
