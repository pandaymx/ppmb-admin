databaseChangeLog:
  - changeSet:
      id: 20260503-003
      author: jules
      changes:
        # 1. 创建部门表 (之前漏掉了)
        - createTable:
            tableName: sys_department
            remarks: "部门表"
            columns:
              - column: {name: id, type: BIGINT, constraints: {primaryKey: true, nullable: false}, remarks: "主键"}
              - column: {name: tenant_id, type: BIGINT, constraints: {nullable: false}, remarks: "租户ID"}
              - column: {name: create_time, type: TIMESTAMP, constraints: {nullable: false}, remarks: "创建时间"}
              - column: {name: create_by, type: BIGINT, constraints: {nullable: false}, remarks: "创建人"}
              - column: {name: dept_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}, remarks: "归属部门"}
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}, remarks: "归属角色"}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}, remarks: "数据权限(0:默认, 1:只读, 99:隐藏)"}
              - column: {name: update_by, type: BIGINT, remarks: "更新人"}
              - column: {name: update_time, type: TIMESTAMP, remarks: "更新时间"}
              - column: {name: del_flag, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}, remarks: "删除标志"}
              - column: {name: version, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}, remarks: "版本号"}
              - column: {name: parent_id, type: BIGINT, remarks: "父部门ID"}
              - column: {name: dept_name, type: VARCHAR(100), constraints: {nullable: false}, remarks: "部门名称"}
              - column: {name: dept_code, type: VARCHAR(50), remarks: "部门编码"}
              - column: {name: abbreviation, type: VARCHAR(50), remarks: "简称"}
              - column: {name: email, type: VARCHAR(100)}
              - column: {name: phone, type: VARCHAR(20)}
              - column: {name: leader_id, type: BIGINT}
              - column: {name: sort_num, type: INT}
              - column: {name: status, type: INT, constraints: {nullable: false}, remarks: "状态(0:正常, 1:停用)"}

        # 2. 为现有表重命名或添加字段
        # sys_user
        - renameColumn: {tableName: sys_user, oldColumnName: create_by_dept, newColumnName: dept_id, columnDataType: BIGINT}
        - addColumn:
            tableName: sys_user
            columns:
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
        
        # sys_role
        - renameColumn: {tableName: sys_role, oldColumnName: create_by_dept, newColumnName: dept_id, columnDataType: BIGINT}
        - addColumn:
            tableName: sys_role
            columns:
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # sys_post
        - renameColumn: {tableName: sys_post, oldColumnName: create_by_dept, newColumnName: dept_id, columnDataType: BIGINT}
        - addColumn:
            tableName: sys_post
            columns:
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # sys_menu
        - addColumn:
            tableName: sys_menu
            columns:
              - column: {name: tenant_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: dept_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: version, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # sys_dict_type
        - renameColumn: {tableName: sys_dict_type, oldColumnName: create_by_dept, newColumnName: dept_id, columnDataType: BIGINT}
        - addColumn:
            tableName: sys_dict_type
            columns:
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # sys_dict_data
        - addColumn:
            tableName: sys_dict_data
            columns:
              - column: {name: dept_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: role_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: update_by, type: BIGINT}
              - column: {name: update_time, type: TIMESTAMP}
              - column: {name: version, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # sys_user_role
        - addColumn:
            tableName: sys_user_role
            columns:
              - column: {name: dept_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: update_by, type: BIGINT}
              - column: {name: update_time, type: TIMESTAMP}
              - column: {name: del_flag, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: version, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # sys_role_menu
        - addColumn:
            tableName: sys_role_menu
            columns:
              - column: {name: tenant_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: create_time, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", constraints: {nullable: false}}
              - column: {name: create_by, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: dept_id, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: data_scope, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: update_by, type: BIGINT}
              - column: {name: update_time, type: TIMESTAMP}
              - column: {name: del_flag, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: version, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}

        # 3. 初始化虚拟数据和管理员
        - insert:
            tableName: sys_department
            columns:
              - column: {name: id, valueNumeric: 0}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: dept_name, value: "虚拟部门"}
              - column: {name: dept_code, value: "virtual"}
              - column: {name: status, valueNumeric: 0}

        - insert:
            tableName: sys_role
            columns:
              - column: {name: id, valueNumeric: 0}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: role_name, value: "虚拟角色"}
              - column: {name: role_code, value: "virtual"}
              - column: {name: status, valueNumeric: 1}
              - column: {name: is_readonly, valueBoolean: true}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}

        - insert:
            tableName: sys_role
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: role_name, value: "超级管理员"}
              - column: {name: role_code, value: "admin"}
              - column: {name: status, valueNumeric: 1}
              - column: {name: is_readonly, valueBoolean: true}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}

        - insert:
            tableName: sys_user
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: dept_id, valueNumeric: 0}
              - column: {name: role_id, valueNumeric: 0}
              - column: {name: data_scope, valueNumeric: 0}
              - column: {name: username, value: "admin"}
              - column: {name: password, value: "$2a$10$7JB720yubVSZvUI0rEqK/.VqGOZTH.ulu33dMnvzhkByS9nUu9Z.G"}
              - column: {name: nickname, value: "管理员"}
              - column: {name: status, valueNumeric: 0}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}

        - insert:
            tableName: sys_user_role
            columns:
              - column: {name: id, valueNumeric: 1}
              - column: {name: tenant_id, valueNumeric: 0}
              - column: {name: create_time, valueComputed: "CURRENT_TIMESTAMP"}
              - column: {name: create_by, valueNumeric: 0}
              - column: {name: user_id, valueNumeric: 1}
              - column: {name: role_id, valueNumeric: 1}
              - column: {name: del_flag, valueNumeric: 0}
              - column: {name: version, valueNumeric: 0}
