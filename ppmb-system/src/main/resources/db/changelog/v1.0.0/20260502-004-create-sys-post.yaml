databaseChangeLog:
  - changeSet:
      id: "20260502-004"
      author: jules
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: sys_post
      changes:
        - createTable:
            tableName: sys_post
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: post_code
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: post_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: sort_num
                  type: INT
              - column:
                  name: status
                  type: TINYINT
                  defaultValueNumeric: 0
              - column:
                  name: remark
                  type: VARCHAR(255)
              - column:
                  name: create_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: create_by_dept
                  type: BIGINT
              - column:
                  name: update_by
                  type: BIGINT
              - column:
                  name: update_time
                  type: TIMESTAMP
              - column:
                  name: del_flag
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
