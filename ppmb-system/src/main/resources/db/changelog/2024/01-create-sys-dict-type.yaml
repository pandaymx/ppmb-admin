databaseChangeLog:
  - changeSet:
      id: "1"
      author: jules
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: sys_dict_type
      changes:
        - createTable:
            tableName: sys_dict_type
            remarks: "字典类型表"
            columns:
              - column:
                  name: id
                  type: bigint
                  remarks: "主键"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: bigint
                  remarks: "租户ID"
                  constraints:
                    nullable: false
              - column:
                  name: create_time
                  type: datetime
                  remarks: "创建时间"
                  constraints:
                    nullable: false
              - column:
                  name: create_by
                  type: bigint
                  remarks: "创建人"
                  constraints:
                    nullable: false
              - column:
                  name: create_by_dept
                  type: bigint
                  remarks: "创建人部门"
              - column:
                  name: update_by
                  type: bigint
                  remarks: "更新人"
              - column:
                  name: update_time
                  type: datetime
                  remarks: "更新时间"
              - column:
                  name: del_flag
                  type: int
                  remarks: "删除标志（0代表存在 1代表删除）"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: int
                  remarks: "版本号"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: dict_name
                  type: varchar(100)
                  remarks: "字典名称"
                  constraints:
                    nullable: false
              - column:
                  name: dict_type
                  type: varchar(100)
                  remarks: "字典类型"
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: "uk_sys_dict_type"
              - column:
                  name: system_flag
                  type: char(1)
                  remarks: "系统内置标志（Y是 N否）"
                  defaultValue: "N"
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: int
                  remarks: "状态（0正常 1停用）"
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: remark
                  type: varchar(500)
                  remarks: "备注"
